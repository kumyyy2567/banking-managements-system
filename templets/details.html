<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .details {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }
        .detail-item {
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .detail-label {
            font-weight: bold;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
        }
        .detail-value {
            color: #333;
            font-size: 18px;
            margin-top: 5px;
        }
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            text-align: center;
            display: inline-block;
        }
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Account Details</h1>
        
        {% if account %}
        <div class="details">
            <div class="detail-item">
                <div class="detail-label">Account Number</div>
                <div class="detail-value">{{ account.accno }}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Customer Name</div>
                <div class="detail-value">{{ account.cname }}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Email</div>
                <div class="detail-value">{{ account.email }}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Balance</div>
                <div class="detail-value">₹ {{ account.balance }}</div>
            </div>
        </div>
        
        <div class="button-group">
            <a href="/update_input/" class="button">✏️ Update</a>
            <a href="/" class="button">🏠 Home</a>
        </div>
        {% else %}
        <p style="text-align: center; color: #666;">Account not found</p>
        {% endif %}
    </div>
</body>
</html>
